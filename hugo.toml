  target_country = "KR"
  coupang_id = "AF7460738"
  
  mainSections = ["posts"]
  homepage_sections = ["posts"]
  
  # 3. 사이트 설명 및 브랜딩
  description = '레고 및 블록, 보드게임, 교육용 완구 등 아이들의 즐거움을 위한 장난감/토이 관련 쿠팡 로켓배송 특가 추천 및 리뷰.'
  brandColor = "#1a1c2c"

  # (공통) 애드센스 정보 및 메타 데이터
  googleAdsenseId = "ca-pub-8982396795153735" 
  author = 'Commander'
  env = 'production'

  # 🚨 사이트 식별 정보
  sitename = "GGG Pick 완구장난감"
  siteurl = "https://toys.gggpick.com"
  startdate = "2026-03-31"
  contactemail = "contact@gggpick.com"
  affiliatetype = "Coupang Partners, Google AdSense"

# 4. 상단 메뉴 설정 (동적 카테고리 시스템 최적화)
[[menu.main]]
  name = "홈"
  # 🚨 사령관님의 전용 수익 창출 링크 장착 완료!
  url = "https://link.coupang.com/a/eCjhp9" 
  weight = 1
    
[[menu.main]]
  name = "Picks"
  url = "/posts/"
  weight = 10

# =========================================================
# ⚙️ [절대 보존 구역] 시스템 코어 엔진
# =========================================================
[pagination]
  pagerSize = 20

hasCJKLanguage = true
buildFuture = true
buildDrafts = true
disableKinds = ["RSS", "sitemap"]

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[permalinks]
  posts = "/:filename/"
  categories = "/categories/:slug/" 
  
[related]
  includeNewer = true
  threshold = 0
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 50
  [[related.indices]]
    name = "date"
    weight = 10
